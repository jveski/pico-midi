<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pico-midi configurator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<connect-banner></connect-banner>

<div class="container has-connect-banner">
  <header>
    <h1><a href="./">pico-midi</a> <span>configurator</span></h1>
  </header>

  <div id="unsupported">
    Web Serial API is not available in this browser. Use Chrome or Edge 89+ on desktop.
  </div>

  <config-panel></config-panel>

</div>

<save-banner></save-banner>
<toast-notification></toast-notification>
<pinout-modal></pinout-modal>

<script type="module">
import "./components/collapsible-card.js";
import "./components/connect-banner.js";
import "./components/toast-notification.js";
import "./components/midi-channel.js";
import "./components/item-list.js";
import "./components/toggle-section.js";
import "./components/config-panel.js";
import "./components/pinout-modal.js";
import "./components/save-banner.js";
import { init } from "./components/app.js";

init({
  connectBanner: document.querySelector("connect-banner"),
  container: document.querySelector(".container"),
  configPanel: document.querySelector("config-panel"),
  saveBanner: document.querySelector("save-banner"),
  toast: document.querySelector("toast-notification"),
});
</script>
</body>
</html>
