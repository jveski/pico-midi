<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pico-midi configurator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1><a href="./">pico-midi</a> <span>configurator</span></h1>
    <status-bar></status-bar>
  </header>

  <div id="unsupported">
    Web Serial API is not available in this browser. Use Chrome or Edge 89+ on desktop.
  </div>

  <app-toolbar></app-toolbar>
  <config-panel></config-panel>

  <div id="emptyState" class="empty-state">
    <p>Connect a pico-midi device via USB to configure it.</p>
  </div>

</div>

<toast-notification></toast-notification>

<script type="module">
import "./components/collapsible-card.js";
import "./components/status-bar.js";
import "./components/app-toolbar.js";
import "./components/toast-notification.js";
import "./components/midi-channel.js";
import "./components/item-list.js";
import "./components/toggle-section.js";
import "./components/config-panel.js";
import { init } from "./components/app.js";

init({
  statusBar: document.querySelector("status-bar"),
  toolbar: document.querySelector("app-toolbar"),
  configPanel: document.querySelector("config-panel"),
  emptyState: document.getElementById("emptyState"),
  toast: document.querySelector("toast-notification"),
});
</script>
</body>
</html>
