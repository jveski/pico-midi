<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIDICtrl Configurator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3348;
  --text: #e1e4ed;
  --text-dim: #8b90a5;
  --accent: #6c7bff;
  --accent-hover: #8490ff;
  --green: #3dd68c;
  --red: #f05a6e;
  --orange: #f0a040;
  --radius: 8px;
  --mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 16px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

header h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

header h1 span { color: var(--text-dim); font-weight: 400; }

.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
}

.status-dot.connected { background: var(--green); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}

.btn:hover { background: var(--surface2); border-color: #3e4460; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { background: var(--surface); border-color: var(--border); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-primary:disabled:hover { background: var(--accent); border-color: var(--accent); }

.btn-danger {
  border-color: var(--red);
  color: var(--red);
}

.btn-danger:hover { background: rgba(240, 90, 110, 0.1); }

.btn-sm { padding: 4px 10px; font-size: 12px; }

.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

#unsupported {
  display: none;
  background: rgba(240, 90, 110, 0.1);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  font-size: 14px;
  color: var(--red);
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}

.card-header:hover { background: var(--surface2); border-radius: var(--radius) var(--radius) 0 0; }

.card-header h2 {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-header .badge {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
}

.card-header .chevron {
  font-size: 12px;
  color: var(--text-dim);
  transition: transform 0.2s;
}

.card-header.collapsed .chevron { transform: rotate(-90deg); }

.card-body { padding: 16px; }
.card-body.collapsed { display: none; }

.field {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.field:last-child { margin-bottom: 0; }

.field label {
  font-size: 13px;
  color: var(--text-dim);
  min-width: 100px;
  flex-shrink: 0;
}

.field input, .field select {
  padding: 6px 10px;
  font-size: 13px;
  font-family: var(--mono);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  width: 80px;
  outline: none;
  transition: border-color 0.15s;
}

.field input:focus, .field select:focus { border-color: var(--accent); }

.field input[type="number"] { -moz-appearance: textfield; }
.field input::-webkit-outer-spin-button,
.field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.item-row:last-of-type { border-bottom: none; }

.item-row .index {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  min-width: 20px;
}

.item-row input {
  padding: 5px 8px;
  font-size: 13px;
  font-family: var(--mono);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  width: 64px;
  outline: none;
  transition: border-color 0.15s;
}

.item-row input:focus { border-color: var(--accent); }

.item-row label {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 28px;
}

.item-row .btn-remove {
  margin-left: auto;
  padding: 2px 8px;
  font-size: 11px;
  color: var(--red);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
}

.item-row .btn-remove:hover { border-color: var(--red); background: rgba(240, 90, 110, 0.08); }

.list-actions {
  padding-top: 10px;
  display: flex;
  gap: 8px;
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.toggle-row label {
  font-size: 13px;
  color: var(--text-dim);
}

.toggle {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}

.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle .slider {
  position: absolute;
  inset: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}

.toggle .slider::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  background: var(--text-dim);
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}

.toggle input:checked + .slider { background: var(--accent); border-color: var(--accent); }
.toggle input:checked + .slider::after { transform: translateX(16px); background: #fff; }

.note-hint {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--mono);
  min-width: 32px;
}

.log-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 20px;
}

.log-panel .card-header h2 { font-size: 13px; }

.log-content {
  padding: 12px 16px;
  max-height: 200px;
  overflow-y: auto;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-dim);
  white-space: pre-wrap;
  word-break: break-all;
}

.log-content .cmd { color: var(--accent); }
.log-content .resp { color: var(--green); }
.log-content .err { color: var(--red); }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
  z-index: 100;
  pointer-events: none;
}

.toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { background: var(--green); color: #0a1a10; }
.toast.error { background: var(--red); color: #fff; }
.toast.info { background: var(--accent); color: #fff; }

.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
}

.empty-state p { margin-bottom: 12px; }

/* ── Inline Monitor Indicators ── */
.monitor-row {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 28px;
  margin-top: 6px;
}

.monitor-indicator {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
  transition: background 0.08s, border-color 0.08s, box-shadow 0.08s;
}

.monitor-indicator.active {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 8px rgba(61, 214, 140, 0.4);
}

.monitor-bar-track {
  flex: 1;
  height: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  min-width: 60px;
}

.monitor-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.06s linear;
}

.monitor-value {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text);
  min-width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.monitor-tap {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
  transition: background 0.06s, border-color 0.06s, box-shadow 0.06s;
}

.monitor-tap.active {
  background: var(--orange);
  border-color: var(--orange);
  box-shadow: 0 0 8px rgba(240, 160, 64, 0.5);
}

.monitor-label {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text-dim);
  min-width: 56px;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>MIDICtrl <span>Configurator</span></h1>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <div id="unsupported">
    Web Serial API is not available in this browser. Use Chrome or Edge 89+ on desktop.
  </div>

  <div class="toolbar" id="toolbar">
    <button class="btn btn-primary" id="btnConnect">Connect</button>
    <button class="btn" id="btnRefresh" disabled>Refresh</button>
    <button class="btn" id="btnSave" disabled>Save to Flash</button>
    <button class="btn" id="btnReset" disabled>Reset Defaults</button>
    <button class="btn btn-danger" id="btnReboot" disabled>Reboot</button>
  </div>

  <div id="configPanel" style="display:none">
    <!-- MIDI Channel -->
    <div class="card">
      <div class="card-header" data-section="general">
        <h2>General</h2>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="card-body" id="sectionGeneral">
        <div class="field">
          <label>MIDI Channel</label>
          <input type="number" id="midiChannel" min="0" max="15" value="0">
          <span class="note-hint" id="midiChannelHint">Ch 1</span>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="card">
      <div class="card-header" data-section="buttons">
        <h2>Buttons <span class="badge" id="btnCount">0</span></h2>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="card-body" id="sectionButtons">
        <div id="buttonList"></div>
        <div class="list-actions">
          <button class="btn btn-sm" id="addButton">+ Add Button</button>
        </div>
      </div>
    </div>

    <!-- Touch Pads -->
    <div class="card">
      <div class="card-header" data-section="touch">
        <h2>Touch Pads <span class="badge" id="touchCount">0</span></h2>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="card-body" id="sectionTouch">
        <div id="touchList"></div>
        <div class="list-actions">
          <button class="btn btn-sm" id="addTouch">+ Add Touch Pad</button>
        </div>
      </div>
    </div>

    <!-- Pots -->
    <div class="card">
      <div class="card-header" data-section="pots">
        <h2>Potentiometers <span class="badge" id="potCount">0</span></h2>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="card-body" id="sectionPots">
        <div id="potList"></div>
        <div class="list-actions">
          <button class="btn btn-sm" id="addPot">+ Add Pot</button>
        </div>
      </div>
    </div>

    <!-- LDR -->
    <div class="card">
      <div class="card-header" data-section="ldr">
        <h2>LDR (Light Sensor)</h2>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="card-body" id="sectionLdr">
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="ldrEnabled">
            <span class="slider"></span>
          </label>
          <label>Enabled</label>
        </div>
        <div id="ldrFields">
          <div class="field">
            <label>Pin (GPIO)</label>
            <input type="number" id="ldrPin" min="0" max="29" value="28">
          </div>
          <div class="field">
            <label>CC Number</label>
            <input type="number" id="ldrCc" min="0" max="127" value="74">
          </div>
          <div id="ldrMonitor"></div>
        </div>
      </div>
    </div>

    <!-- Accelerometer -->
    <div class="card">
      <div class="card-header" data-section="accel">
        <h2>Accelerometer</h2>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="card-body" id="sectionAccel">
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="accelEnabled">
            <span class="slider"></span>
          </label>
          <label>Enabled</label>
        </div>
        <div id="accelFields">
          <div class="field">
            <label>SDA Pin</label>
            <input type="number" id="accelSda" min="0" max="29" value="0">
          </div>
          <div class="field">
            <label>SCL Pin</label>
            <input type="number" id="accelScl" min="0" max="29" value="1">
          </div>
          <div class="field">
            <label>INT Pin</label>
            <input type="number" id="accelInt" min="0" max="29" value="11">
          </div>
          <div class="field">
            <label>X Axis CC</label>
            <input type="number" id="accelXCc" min="0" max="127" value="1">
          </div>
          <div class="field">
            <label>Y Axis CC</label>
            <input type="number" id="accelYCc" min="0" max="127" value="2">
          </div>
          <div class="field">
            <label>Tap Note</label>
            <input type="number" id="accelTapNote" min="0" max="127" value="48">
            <span class="note-hint" id="tapNoteHint"></span>
          </div>
          <div class="field">
            <label>Tap Velocity</label>
            <input type="number" id="accelTapVel" min="1" max="127" value="127">
          </div>
          <div class="field">
            <label>Dead Zone</label>
            <input type="number" id="accelDeadZone" min="0" max="255" value="13">
            <span class="note-hint" id="deadZoneHint"></span>
          </div>
          <div class="field">
            <label>Smoothing</label>
            <input type="number" id="accelSmoothing" min="0" max="100" value="25">
            <span class="note-hint" id="smoothingHint"></span>
          </div>
          <div id="accelMonitor"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="emptyState" class="empty-state">
    <p>Connect a MIDICtrl device via USB to configure it.</p>
  </div>

  <!-- Serial log (collapsed by default) -->
  <div class="log-panel">
    <div class="card-header collapsed" data-section="log">
      <h2>Serial Log</h2>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="card-body collapsed" id="sectionLog">
      <div class="log-content" id="logContent"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

// ── MIDI note names ──
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function noteName(n) {
  if (n < 0 || n > 127) return "";
  return NOTE_NAMES[n % 12] + (Math.floor(n / 12) - 1);
}

// ── Toast notifications ──
let toastTimer = null;
function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast " + type + " visible";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove("visible"); }, 2500);
}

// ── Serial log ──
const logEl = document.getElementById("logContent");
function log(text, cls) {
  const span = document.createElement("span");
  span.className = cls || "";
  span.textContent = text + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Serial connection state ──
let port = null;
let reader = null;
let writer = null;
let readBuf = "";
let keepReading = false;
let cmdLock = Promise.resolve();

const encoder = new TextEncoder();
const decoder = new TextDecoder();

// ── DOM refs ──
const btnConnect = document.getElementById("btnConnect");
const btnRefresh = document.getElementById("btnRefresh");
const btnSave = document.getElementById("btnSave");
const btnReset = document.getElementById("btnReset");
const btnReboot = document.getElementById("btnReboot");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const configPanel = document.getElementById("configPanel");
const emptyState = document.getElementById("emptyState");

// ── Config model ──
let config = null;

// ── Monitor state ──
let monitorPollTimer = null;
let monitorTapTimer = null;

// ── Web Serial check ──
if (!("serial" in navigator)) {
  document.getElementById("unsupported").style.display = "block";
  btnConnect.disabled = true;
}

// ── Connect / Disconnect ──
btnConnect.addEventListener("click", async () => {
  if (port) {
    await disconnect();
  } else {
    await connect();
  }
});

async function connect() {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    writer = port.writable.getWriter();
    keepReading = true;
    readLoop();
    setConnected(true);
    log("Connected", "resp");
    // Verify device
    const ver = await sendCommand("VERSION");
    if (!ver.startsWith("midictrl")) {
      toast("Unexpected device: " + ver, "error");
    } else {
      statusText.textContent = ver.trim();
    }
    await refreshConfig();
    // Start automatic monitoring (firmware always streams M: lines)
    startMonitorPoll();
  } catch (e) {
    if (e.name !== "NotFoundError") {
      log("Connection error: " + e.message, "err");
      toast("Connection failed", "error");
    }
    await disconnect();
  }
}

async function disconnect() {
  stopMonitorPoll();
  keepReading = false;
  try { if (reader) { await reader.cancel(); reader.releaseLock(); } } catch {}
  try { if (writer) { writer.releaseLock(); } } catch {}
  try { if (port) { await port.close(); } } catch {}
  reader = null;
  writer = null;
  port = null;
  readBuf = "";
  cmdLock = Promise.resolve();
  setConnected(false);
  log("Disconnected", "err");
}

function setConnected(connected) {
  statusDot.className = connected ? "status-dot connected" : "status-dot";
  if (!connected) statusText.textContent = "Disconnected";
  btnConnect.textContent = connected ? "Disconnect" : "Connect";
  btnConnect.classList.toggle("btn-primary", !connected);
  btnConnect.classList.toggle("btn-danger", connected);
  btnRefresh.disabled = !connected;
  btnSave.disabled = !connected;
  btnReset.disabled = !connected;
  btnReboot.disabled = !connected;
  configPanel.style.display = connected ? "" : "none";
  emptyState.style.display = connected ? "none" : "";
}

function setToolbarBusy(busy) {
  btnRefresh.disabled = busy;
  btnSave.disabled = busy;
  btnReset.disabled = busy;
  btnReboot.disabled = busy;
}

// ── Read loop: accumulates data into readBuf ──
async function readLoop() {
  while (keepReading && port && port.readable) {
    try {
      reader = port.readable.getReader();
      while (keepReading) {
        const { value, done } = await reader.read();
        if (done) break;
        readBuf += decoder.decode(value, { stream: true });
      }
    } catch (e) {
      if (keepReading) log("Read error: " + e.message, "err");
    } finally {
      try { reader.releaseLock(); } catch {}
      reader = null;
    }
  }
}

// ── Send a command, wait for full response ──
// The firmware now always streams M: lines interleaved with command responses.
// sendCommand must skip M: lines while collecting the actual response.
function sendCommand(cmd) {
  const p = cmdLock.then(() => _sendCommand(cmd));
  cmdLock = p.catch(() => {});
  return p;
}

async function _sendCommand(cmd) {
  if (!writer) throw new Error("Not connected");
  log("> " + cmd, "cmd");

  // Drain any stale data (but process M: lines first)
  drainMonitorLines();
  readBuf = "";

  await writer.write(encoder.encode(cmd + "\n"));

  const deadline = Date.now() + 3000;
  while (Date.now() < deadline) {
    await sleep(20);

    // Strip out M: lines from readBuf while waiting for the response
    drainMonitorLines();

    const lines = readBuf.split("\n");
    if (lines.length < 2) continue;

    // Find first non-M: complete line as the response
    for (let i = 0; i < lines.length - 1; i++) {
      const resp = lines[i].trim();
      if (resp.length > 0 && !resp.startsWith("M:")) {
        readBuf = lines.slice(i + 1).join("\n");
        log(resp.length > 80 ? resp.substring(0, 80) + "..." : resp, "resp");
        return resp;
      }
    }
    // Keep only the last incomplete line
    readBuf = lines[lines.length - 1];
  }
  throw new Error("Timeout waiting for response");
}

// Extract and apply any complete M: lines from readBuf (used during command waits)
function drainMonitorLines() {
  const lines = readBuf.split("\n");
  const incomplete = lines.pop() || "";
  const kept = [];
  for (const raw of lines) {
    const line = raw.trim();
    if (line.startsWith("M:")) {
      applyMonitorLine(line);
    } else if (line.length > 0) {
      kept.push(raw);
    }
  }
  // Rebuild readBuf: kept complete lines (each terminated with \n) + incomplete tail
  readBuf = (kept.length > 0 ? kept.join("\n") + "\n" : "") + incomplete;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Config binary format constants (must match firmware config.rs) ──
const CONFIG_MAGIC = 0x4D494449; // "MIDI" in little-endian
const CONFIG_VERSION = 1;
const MAX_BUTTONS = 8;
const MAX_TOUCH_PADS = 8;
const MAX_POTS = 4;

// ── Hex encode/decode ──
function hexEncode(bytes) {
  return Array.from(bytes, b => b.toString(16).padStart(2, '0')).join('');
}
function hexDecode(str) {
  const bytes = new Uint8Array(str.length / 2);
  for (let i = 0; i < bytes.length; i++) {
    bytes[i] = parseInt(str.substr(i * 2, 2), 16);
  }
  return bytes;
}

// ── Decode binary config from hex string ──
function decodeConfig(hex) {
  const b = hexDecode(hex.trim());
  if (b.length < 6) return null;
  const magic = b[0] | (b[1] << 8) | (b[2] << 16) | (b[3] << 24);
  if (magic !== CONFIG_MAGIC || b[4] !== CONFIG_VERSION) return null;

  const cfg = {
    midi_channel: 0, buttons: [], touch_pads: [], pots: [],
    ldr_enabled: false, ldr: { pin: 28, cc: 74 },
    accel_enabled: false,
    accel: { sda: 0, scl: 1, int_pin: 11, x_cc: 1, y_cc: 2, tap_note: 48, tap_vel: 127, dead_zone: 13, smoothing: 25 },
  };

  let i = 5;
  if (i >= b.length) return cfg;
  cfg.midi_channel = Math.min(b[i++], 15);

  // Buttons
  if (i >= b.length) return cfg;
  const nb = Math.min(b[i++], MAX_BUTTONS);
  for (let j = 0; j < nb; j++) {
    if (i + 2 >= b.length) return cfg;
    cfg.buttons.push({ pin: b[i], note: Math.min(b[i+1], 127), velocity: Math.max(1, Math.min(b[i+2], 127)) });
    i += 3;
  }

  // Touch pads
  if (i >= b.length) return cfg;
  const nt = Math.min(b[i++], MAX_TOUCH_PADS);
  for (let j = 0; j < nt; j++) {
    if (i + 2 >= b.length) return cfg;
    cfg.touch_pads.push({ pin: b[i], note: Math.min(b[i+1], 127), velocity: Math.max(1, Math.min(b[i+2], 127)) });
    i += 3;
  }

  // Pots
  if (i >= b.length) return cfg;
  const np = Math.min(b[i++], MAX_POTS);
  for (let j = 0; j < np; j++) {
    if (i + 1 >= b.length) return cfg;
    cfg.pots.push({ pin: b[i], cc: Math.min(b[i+1], 127) });
    i += 2;
  }

  // LDR
  if (i + 2 >= b.length) return cfg;
  cfg.ldr_enabled = b[i] !== 0;
  cfg.ldr = { pin: b[i+1], cc: Math.min(b[i+2], 127) };
  i += 3;

  // Accelerometer
  if (i + 9 >= b.length) return cfg;
  cfg.accel_enabled = b[i] !== 0;
  cfg.accel = {
    sda: b[i+1], scl: b[i+2], int_pin: b[i+3],
    x_cc: Math.min(b[i+4], 127), y_cc: Math.min(b[i+5], 127),
    tap_note: Math.min(b[i+6], 127), tap_vel: Math.max(1, Math.min(b[i+7], 127)),
    dead_zone: b[i+8], smoothing: b[i+9],
  };

  return cfg;
}

// ── Encode config to hex string for PUT command ──
function encodeConfig(cfg) {
  const buf = [];
  // Header
  buf.push(CONFIG_MAGIC & 0xFF, (CONFIG_MAGIC >> 8) & 0xFF, (CONFIG_MAGIC >> 16) & 0xFF, (CONFIG_MAGIC >> 24) & 0xFF);
  buf.push(CONFIG_VERSION);
  // MIDI channel
  buf.push(Math.min(cfg.midi_channel, 15));
  // Buttons
  const nb = Math.min(cfg.buttons.length, MAX_BUTTONS);
  buf.push(nb);
  for (let j = 0; j < nb; j++) {
    buf.push(cfg.buttons[j].pin, Math.min(cfg.buttons[j].note, 127), Math.max(1, Math.min(cfg.buttons[j].velocity, 127)));
  }
  // Touch pads
  const nt = Math.min(cfg.touch_pads.length, MAX_TOUCH_PADS);
  buf.push(nt);
  for (let j = 0; j < nt; j++) {
    buf.push(cfg.touch_pads[j].pin, Math.min(cfg.touch_pads[j].note, 127), Math.max(1, Math.min(cfg.touch_pads[j].velocity, 127)));
  }
  // Pots
  const np = Math.min(cfg.pots.length, MAX_POTS);
  buf.push(np);
  for (let j = 0; j < np; j++) {
    buf.push(cfg.pots[j].pin, Math.min(cfg.pots[j].cc, 127));
  }
  // LDR
  buf.push(cfg.ldr_enabled ? 1 : 0, cfg.ldr.pin, Math.min(cfg.ldr.cc, 127));
  // Accelerometer
  const a = cfg.accel;
  buf.push(cfg.accel_enabled ? 1 : 0, a.sda, a.scl, a.int_pin,
    Math.min(a.x_cc, 127), Math.min(a.y_cc, 127),
    Math.min(a.tap_note, 127), Math.max(1, Math.min(a.tap_vel, 127)),
    a.dead_zone, a.smoothing);

  return hexEncode(new Uint8Array(buf));
}

// ── Refresh config from device ──
async function refreshConfig() {
  setToolbarBusy(true);
  try {
    const resp = await sendCommand("GET");
    config = decodeConfig(resp);
    renderConfig();
    toast("Config loaded", "success");
  } catch (e) {
    log("Refresh failed: " + e.message, "err");
    toast("Failed to load config", "error");
  } finally {
    setToolbarBusy(false);
  }
}

btnRefresh.addEventListener("click", refreshConfig);

// ── Apply config to device: encode and send as single PUT command ──
async function applyConfig() {
  try {
    readConfigFromUI();
    const hex = encodeConfig(config);
    const r = await sendCommand("PUT " + hex);
    if (!r.startsWith("OK")) throw new Error("PUT: " + r);
    return true;
  } catch (e) {
    log("Apply failed: " + e.message, "err");
    toast("Apply failed: " + e.message, "error");
    return false;
  }
}

// ── Save to flash ──
btnSave.addEventListener("click", async () => {
  setToolbarBusy(true);
  try {
    if (!await applyConfig()) return;
    const r = await sendCommand("SAVE");
    if (r.includes("OK")) {
      toast("Saved to flash", "success");
    } else {
      toast("Save failed: " + r, "error");
    }
  } catch (e) {
    log("Save error: " + e.message, "err");
    toast("Save failed", "error");
  } finally {
    setToolbarBusy(false);
  }
});

// ── Reset defaults ──
btnReset.addEventListener("click", async () => {
  if (!confirm("Reset all config to factory defaults? (in RAM only, use Save to persist)")) return;
  setToolbarBusy(true);
  try {
    const r = await sendCommand("RESET");
    if (r.startsWith("OK")) {
      await refreshConfig();
      toast("Defaults restored", "info");
    }
  } catch (e) {
    log("Reset error: " + e.message, "err");
    toast("Reset failed", "error");
  } finally {
    setToolbarBusy(false);
  }
});

// ── Reboot device ──
btnReboot.addEventListener("click", async () => {
  if (!confirm("Reboot the device? Unsaved changes will be lost.")) return;
  setToolbarBusy(true);
  try {
    await sendCommand("REBOOT");
    toast("Device rebooting...", "info");
    await disconnect();
  } catch (e) {
    await disconnect();
    toast("Device rebooted", "info");
  }
});

// ── Render config into UI ──
function renderConfig() {
  if (!config) return;

  document.getElementById("midiChannel").value = config.midi_channel;
  updateMidiChannelHint();

  renderList("buttonList", "btnCount", config.buttons, "button", 8);
  renderList("touchList", "touchCount", config.touch_pads, "touch", 8);
  renderPotList("potList", "potCount", config.pots, 4);

  document.getElementById("ldrEnabled").checked = config.ldr_enabled;
  document.getElementById("ldrPin").value = config.ldr.pin;
  document.getElementById("ldrCc").value = config.ldr.cc;

  document.getElementById("accelEnabled").checked = config.accel_enabled;
  document.getElementById("accelSda").value = config.accel.sda;
  document.getElementById("accelScl").value = config.accel.scl;
  document.getElementById("accelInt").value = config.accel.int_pin;
  document.getElementById("accelXCc").value = config.accel.x_cc;
  document.getElementById("accelYCc").value = config.accel.y_cc;
  document.getElementById("accelTapNote").value = config.accel.tap_note;
  document.getElementById("accelTapVel").value = config.accel.tap_vel;

  document.getElementById("accelSmoothing").value = config.accel.smoothing;

}

function renderList(containerId, countId, items, type, max) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  document.getElementById(countId).textContent = items.length;

  const monPrefix = type === "button" ? "monBtn" : "monTouch";

  items.forEach((item, i) => {
    const row = document.createElement("div");
    row.className = "item-row";
    row.innerHTML =
      '<span class="index">#' + (i + 1) + '</span>' +
      '<div class="monitor-indicator" id="' + monPrefix + i + '"></div>' +
      '<label>Pin</label><input type="number" min="0" max="29" value="' + item.pin + '" data-type="' + type + '" data-idx="' + i + '" data-field="pin">' +
      '<label>Note</label><input type="number" min="0" max="127" value="' + item.note + '" data-type="' + type + '" data-idx="' + i + '" data-field="note">' +
      '<span class="note-hint">' + noteName(item.note) + '</span>' +
      '<label>Vel</label><input type="number" min="1" max="127" value="' + item.velocity + '" data-type="' + type + '" data-idx="' + i + '" data-field="velocity">' +
      '<button class="btn-remove" data-type="' + type + '" data-idx="' + i + '">Remove</button>';
    container.appendChild(row);
  });

  container.querySelectorAll('input[data-field="note"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const hint = inp.parentElement.querySelector(".note-hint");
      if (hint) hint.textContent = noteName(parseInt(inp.value, 10) || 0);
    });
  });

  container.querySelectorAll(".btn-remove").forEach(btn => {
    btn.addEventListener("click", () => {
      syncListFromDOM(container, items);
      const idx = parseInt(btn.dataset.idx, 10);
      items.splice(idx, 1);
      renderList(containerId, countId, items, type, max);
    });
  });

  const addId = type === "button" ? "addButton" : "addTouch";
  document.getElementById(addId).disabled = items.length >= max;
}

function renderPotList(containerId, countId, items, max) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  document.getElementById(countId).textContent = items.length;

  items.forEach((item, i) => {
    const row = document.createElement("div");
    row.className = "item-row";

      '<label>CC</label><input type="number" min="0" max="127" value="' + item.cc + '" data-type="pot" data-idx="' + i + '" data-field="cc">' +

  config.midi_channel = clamp(num(document.getElementById("midiChannel").value, 0), 0, 15);

  config.buttons = readItemsFromDOM("buttonList", "button");
  config.touch_pads = readItemsFromDOM("touchList", "touch");
  config.pots = readPotsFromDOM("potList");

  config.ldr_enabled = document.getElementById("ldrEnabled").checked;
  config.ldr = {
    pin: clamp(num(document.getElementById("ldrPin").value, 0), 0, 29),
    cc: clamp(num(document.getElementById("ldrCc").value, 0), 0, 127),
  };

  config.accel_enabled = document.getElementById("accelEnabled").checked;
  config.accel = {
    sda: clamp(num(document.getElementById("accelSda").value, 0), 0, 29),
    scl: clamp(num(document.getElementById("accelScl").value, 0), 0, 29),
    int_pin: clamp(num(document.getElementById("accelInt").value, 0), 0, 29),
    x_cc: clamp(num(document.getElementById("accelXCc").value, 0), 0, 127),
    y_cc: clamp(num(document.getElementById("accelYCc").value, 0), 0, 127),
    tap_note: clamp(num(document.getElementById("accelTapNote").value, 0), 0, 127),
    tap_vel: clamp(num(document.getElementById("accelTapVel").value, 1), 1, 127),
    dead_zone: clamp(num(document.getElementById("accelDeadZone").value, 0), 0, 255),
    smoothing: clamp(num(document.getElementById("accelSmoothing").value, 0), 0, 100),
  };
}

function readItemsFromDOM(containerId, type) {
  const items = [];
  const container = document.getElementById(containerId);
  const rows = container.querySelectorAll(".item-row");
  rows.forEach(row => {
    const pin = clamp(num(row.querySelector('[data-field="pin"]').value, 0), 0, 29);
    const note = clamp(num(row.querySelector('[data-field="note"]').value, 0), 0, 127);
    const velocity = clamp(num(row.querySelector('[data-field="velocity"]').value, 100), 1, 127);
    items.push({ pin, note, velocity });
  });
  return items;
}

function readPotsFromDOM(containerId) {
  const items = [];
  const container = document.getElementById(containerId);
  const rows = container.querySelectorAll(".item-row");
  rows.forEach(row => {
    const pin = clamp(num(row.querySelector('[data-field="pin"]').value, 0), 0, 29);
    const cc = clamp(num(row.querySelector('[data-field="cc"]').value, 0), 0, 127);
    items.push({ pin, cc });
  });
  return items;
}

function num(s, fallback) { const v = parseInt(s, 10); return isNaN(v) ? fallback : v; }

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ── Automatic Input Monitoring ──
// The firmware always streams M: lines at ~50ms intervals.
// We poll readBuf on a timer to extract and apply them.

function startMonitorPoll() {
  if (monitorPollTimer) return;
  monitorPollTimer = setInterval(processMonitorBuffer, 30);
}

function stopMonitorPoll() {
  clearInterval(monitorPollTimer);
  monitorPollTimer = null;
}

// Parse a single M: line and update the inline DOM indicators
function applyMonitorLine(line) {
  // Format: M:b=01100000,t=11010000,p=64:127:0:0,l=42,ax=65,ay=58,at=0
  if (!line.startsWith("M:")) return;
  const data = line.substring(2);
  const parts = {};
  for (const seg of data.split(",")) {
    const eq = seg.indexOf("=");
    if (eq > 0) {
      parts[seg.substring(0, eq)] = seg.substring(eq + 1);
    }
  }

  // Buttons
  if (parts.b) {
    for (let i = 0; i < parts.b.length && i < 8; i++) {
      const el = document.getElementById("monBtn" + i);
      if (el) el.classList.toggle("active", parts.b[i] === "1");
    }
  }

  // Touch pads
  if (parts.t) {
    for (let i = 0; i < parts.t.length && i < 8; i++) {
      const el = document.getElementById("monTouch" + i);
      if (el) el.classList.toggle("active", parts.t[i] === "1");
    }
  }

  // Pots
  if (parts.p) {
    const vals = parts.p.split(":");
    for (let i = 0; i < vals.length && i < 4; i++) {
      const v = parseInt(vals[i], 10) || 0;
      const bar = document.getElementById("monPotBar" + i);
      const val = document.getElementById("monPotVal" + i);
      if (bar) bar.style.width = ((v / 127) * 100).toFixed(1) + "%";
      if (val) val.textContent = v;
    }
  }

  // LDR
  if (parts.l !== undefined) {
    const v = parseInt(parts.l, 10) || 0;
    const bar = document.getElementById("monLdrBar");
    const val = document.getElementById("monLdrVal");
    if (bar) bar.style.width = ((v / 127) * 100).toFixed(1) + "%";
    if (val) val.textContent = v;
  }

  // Accelerometer
  if (parts.ax !== undefined) {
    const v = parseInt(parts.ax, 10) || 0;
    const bar = document.getElementById("monAccelXBar");
    const val = document.getElementById("monAccelXVal");
    if (bar) bar.style.width = ((v / 127) * 100).toFixed(1) + "%";
    if (val) val.textContent = v;
  }
  if (parts.ay !== undefined) {
    const v = parseInt(parts.ay, 10) || 0;
    const bar = document.getElementById("monAccelYBar");
    const val = document.getElementById("monAccelYVal");
    if (bar) bar.style.width = ((v / 127) * 100).toFixed(1) + "%";
    if (val) val.textContent = v;
  }
  if (parts.at === "1") {
    const el = document.getElementById("monAccelTap");
    if (el) {
      el.classList.add("active");
      clearTimeout(monitorTapTimer);
      monitorTapTimer = setTimeout(() => el.classList.remove("active"), 200);
    }
  }
}

// Process buffered monitor data from readBuf
function processMonitorBuffer() {
  if (!port) return;
  const lines = readBuf.split("\n");
  readBuf = lines.pop() || "";
  for (const raw of lines) {
    const line = raw.trim();
    if (line.startsWith("M:")) {
      applyMonitorLine(line);
    }
  }
}
</script>
