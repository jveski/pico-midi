<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pico-midi configurator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000; --fg: #fff; --dim: #888; --border: #444;
  --green: #0f0; --red: #f00; --orange: #f80;
  --mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
}

body { font-family: var(--mono); background: var(--bg); color: var(--fg); line-height: 1.5; min-height: 100vh; }

.container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
collapsible-card { display: block; }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
header h1 { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
header h1 span { color: var(--dim); font-weight: 400; }

.status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); text-transform: uppercase; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
.status-dot.connected { background: var(--green); }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  font-size: 12px; font-weight: 700; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.05em;
  border: 1px solid var(--border); background: var(--bg); color: var(--fg); cursor: pointer; white-space: nowrap;
}
.btn:hover { background: var(--fg); color: var(--bg); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn:disabled:hover { background: var(--bg); color: var(--fg); }
.btn-primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.btn-primary:hover { background: var(--dim); }
.btn-primary:disabled:hover { background: var(--fg); color: var(--bg); }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: var(--bg); }
.btn-sm { padding: 3px 10px; font-size: 11px; }

.toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

#unsupported { display: none; border: 1px solid var(--red); padding: 16px; margin-bottom: 20px; font-size: 13px; color: var(--red); }

.card { border: 1px solid var(--border); margin-bottom: 12px; }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
}
.card-header:hover { background: #111; }
.card-header h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; }
.card-header .badge { font-size: 11px; font-weight: 700; padding: 1px 6px; border: 1px solid var(--border); color: var(--dim); }
.card-header .chevron { font-size: 12px; color: var(--dim); transition: transform 0.15s; }
.card-header.collapsed .chevron { transform: rotate(-90deg); }
.card-body { padding: 16px; }
.card-body.collapsed { display: none; }

.field { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 12px; color: var(--dim); min-width: 100px; flex-shrink: 0; text-transform: uppercase; }
.field input, .field select {
  padding: 5px 8px; font-size: 13px; font-family: var(--mono);
  background: var(--bg); border: 1px solid var(--border); color: var(--fg); width: 80px; outline: none;
}
.field input:focus, .field select:focus { border-color: var(--fg); }
.field input[type="number"] { -moz-appearance: textfield; }
.field input::-webkit-outer-spin-button,
.field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.item-row:last-of-type { border-bottom: none; }
.item-row .index { font-size: 11px; color: var(--dim); min-width: 20px; }
.item-row input {
  padding: 4px 8px; font-size: 13px; font-family: var(--mono);
  background: var(--bg); border: 1px solid var(--border); color: var(--fg); width: 64px; outline: none;
}
.item-row input:focus { border-color: var(--fg); }
.item-row label { font-size: 11px; color: var(--dim); min-width: 28px; text-transform: uppercase; }
.item-row .btn-remove {
  margin-left: auto; padding: 2px 8px; font-size: 11px; color: var(--red);
  background: transparent; border: 1px solid transparent; cursor: pointer; text-transform: uppercase;
}
.item-row .btn-remove:hover { border-color: var(--red); }
.list-actions { padding-top: 10px; display: flex; gap: 8px; }

.toggle-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.toggle-row label { font-size: 12px; color: var(--dim); text-transform: uppercase; }
.toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider {
  position: absolute; inset: 0; background: #222; border: 1px solid var(--border); cursor: pointer; transition: background 0.15s;
}
.toggle .slider::after {
  content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
  background: var(--dim); transition: transform 0.15s, background 0.15s;
}
.toggle input:checked + .slider { background: var(--fg); border-color: var(--fg); }
.toggle input:checked + .slider::after { transform: translateX(16px); background: var(--bg); }

.note-hint { font-size: 11px; color: var(--dim); min-width: 32px; }

.log-panel { border: 1px solid var(--border); margin-top: 20px; }
.log-panel .card-header h2 { font-size: 12px; }
.log-content {
  padding: 12px 16px; max-height: 200px; overflow-y: auto;
  font-size: 12px; line-height: 1.6; color: var(--dim); white-space: pre-wrap; word-break: break-all;
}
.log-content .cmd { color: var(--fg); }
.log-content .resp { color: var(--green); }
.log-content .err { color: var(--red); }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  padding: 10px 20px; font-size: 13px; font-weight: 700; text-transform: uppercase;
  opacity: 0; transition: transform 0.2s, opacity 0.2s; z-index: 100; pointer-events: none;
}
.toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { background: var(--green); color: var(--bg); }
.toast.error { background: var(--red); color: var(--bg); }
.toast.info { background: var(--fg); color: var(--bg); }

.empty-state { padding: 40px 20px; text-align: center; color: var(--dim); font-size: 13px; }
.empty-state p { margin-bottom: 12px; }

.monitor-row { display: flex; align-items: center; gap: 10px; height: 28px; margin-top: 6px; }
.monitor-indicator {
  width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border);
  background: #111; flex-shrink: 0; transition: background 0.08s, border-color 0.08s;
}
.monitor-indicator.active { background: var(--green); border-color: var(--green); }
.monitor-bar-track { flex: 1; height: 6px; background: #111; border: 1px solid var(--border); overflow: hidden; min-width: 60px; }
.monitor-bar-fill { height: 100%; width: 0%; background: var(--fg); transition: width 0.06s linear; }
.monitor-value { font-size: 12px; color: var(--fg); min-width: 28px; text-align: right; flex-shrink: 0; }
.monitor-tap {
  width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border);
  background: #111; flex-shrink: 0; transition: background 0.06s, border-color 0.06s;
}
.monitor-tap.active { background: var(--orange); border-color: var(--orange); }
.monitor-label { font-size: 12px; color: var(--dim); min-width: 56px; flex-shrink: 0; text-transform: uppercase; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>pico-midi <span>configurator</span></h1>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <div id="unsupported">
    Web Serial API is not available in this browser. Use Chrome or Edge 89+ on desktop.
  </div>

  <div class="toolbar" id="toolbar">
    <button class="btn btn-primary" id="btnConnect">Connect</button>
    <button class="btn" id="btnRefresh" disabled>Refresh</button>
    <button class="btn" id="btnSave" disabled>Save to Flash</button>
    <button class="btn" id="btnReset" disabled>Reset Defaults</button>
    <button class="btn btn-danger" id="btnReboot" disabled>Reboot</button>
  </div>

  <div id="configPanel" style="display:none">
    <!-- MIDI Channel -->
    <collapsible-card data-section="general" data-title="General">
      <div class="field">
        <label>MIDI Channel</label>
        <input type="number" id="midiChannel" min="0" max="15" value="0">
        <span class="note-hint" id="midiChannelHint">Ch 1</span>
      </div>
    </collapsible-card>

    <!-- Buttons -->
    <collapsible-card data-section="buttons" data-title="Buttons" data-badge-id="btnCount">
      <div id="buttonList"></div>
      <div class="list-actions">
        <button class="btn btn-sm" id="addButton">+ Add Button</button>
      </div>
    </collapsible-card>

    <!-- Touch Pads -->
    <collapsible-card data-section="touch" data-title="Touch Pads" data-badge-id="touchCount">
      <div id="touchList"></div>
      <div class="list-actions">
        <button class="btn btn-sm" id="addTouch">+ Add Touch Pad</button>
      </div>
    </collapsible-card>

    <!-- Pots -->
    <collapsible-card data-section="pots" data-title="Potentiometers" data-badge-id="potCount">
      <div id="potList"></div>
      <div class="list-actions">
        <button class="btn btn-sm" id="addPot">+ Add Pot</button>
      </div>
    </collapsible-card>

    <!-- LDR -->
    <collapsible-card data-section="ldr" data-title="LDR (Light Sensor)">
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="ldrEnabled">
          <span class="slider"></span>
        </label>
        <label>Enabled</label>
      </div>
      <div id="ldrFields">
        <div class="field">
          <label>Pin (GPIO)</label>
          <input type="number" id="ldrPin" min="0" max="29" value="28">
        </div>
        <div class="field">
          <label>CC Number</label>
          <input type="number" id="ldrCc" min="0" max="127" value="74">
        </div>
        <div id="ldrMonitor"></div>
      </div>
    </collapsible-card>

    <!-- Accelerometer -->
    <collapsible-card data-section="accel" data-title="Accelerometer">
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="accelEnabled">
          <span class="slider"></span>
        </label>
        <label>Enabled</label>
      </div>
      <div id="accelFields">
        <div class="field">
          <label>SDA Pin</label>
          <input type="number" id="accelSda" min="0" max="29" value="0">
        </div>
        <div class="field">
          <label>SCL Pin</label>
          <input type="number" id="accelScl" min="0" max="29" value="1">
        </div>
        <div class="field">
          <label>INT Pin</label>
          <input type="number" id="accelInt" min="0" max="29" value="11">
        </div>
        <div class="field">
          <label>X Axis CC</label>
          <input type="number" id="accelXCc" min="0" max="127" value="1">
        </div>
        <div class="field">
          <label>Y Axis CC</label>
          <input type="number" id="accelYCc" min="0" max="127" value="2">
        </div>
        <div class="field">
          <label>Tap Note</label>
          <input type="number" id="accelTapNote" min="0" max="127" value="48">
          <span class="note-hint" id="tapNoteHint"></span>
        </div>
        <div class="field">
          <label>Tap Velocity</label>
          <input type="number" id="accelTapVel" min="1" max="127" value="127">
        </div>
        <div class="field">
          <label>Dead Zone</label>
          <input type="number" id="accelDeadZone" min="0" max="255" value="13">
          <span class="note-hint" id="deadZoneHint"></span>
        </div>
        <div class="field">
          <label>Smoothing</label>
          <input type="number" id="accelSmoothing" min="0" max="100" value="25">
          <span class="note-hint" id="smoothingHint"></span>
        </div>
        <div id="accelMonitor"></div>
      </div>
    </collapsible-card>
  </div>

  <div id="emptyState" class="empty-state">
    <p>Connect a pico-midi device via USB to configure it.</p>
  </div>

  <!-- Serial log (collapsed by default) -->
  <div class="log-panel">
    <div class="card-header collapsed" data-section="log">
      <h2>Serial Log</h2>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="card-body collapsed" id="sectionLog">
      <div class="log-content" id="logContent"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

// ── Collapsible Card Web Component ──
class CollapsibleCard extends HTMLElement {
  connectedCallback() {
    if (this._initialized) return;
    this._initialized = true;

    const section = this.dataset.section;
    const title = this.dataset.title;
    const badgeId = this.dataset.badgeId;
    const bodyId = section ? "section" + section[0].toUpperCase() + section.slice(1) : null;

    const children = document.createDocumentFragment();
    while (this.firstChild) children.appendChild(this.firstChild);

    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";
    if (section) header.dataset.section = section;
    const h2 = document.createElement("h2");
    h2.textContent = title;
    if (badgeId) {
      h2.append(" ");
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.id = badgeId;
      badge.textContent = "0";
      h2.appendChild(badge);
    }
    header.appendChild(h2);
    const chevron = document.createElement("span");
    chevron.className = "chevron";
    chevron.innerHTML = "&#9660;";
    header.appendChild(chevron);

    const body = document.createElement("div");
    body.className = "card-body";
    if (bodyId) body.id = bodyId;
    body.appendChild(children);

    header.addEventListener("click", () => {
      const collapsed = body.classList.toggle("collapsed");
      header.classList.toggle("collapsed", collapsed);
    });

    card.appendChild(header);
    card.appendChild(body);
    this.appendChild(card);
  }
}
customElements.define("collapsible-card", CollapsibleCard);

// ── COBS encode/decode ──
// COBS: Consistent Overhead Byte Stuffing. Frames end with 0x00 sentinel.
function cobsEncode(data) {
  const out = [];
  let codeIdx = 0;
  let code = 1;
  out.push(0); // placeholder for first code byte
  for (let i = 0; i < data.length; i++) {
    if (data[i] === 0) {
      out[codeIdx] = code;
      codeIdx = out.length;
      out.push(0); // placeholder
      code = 1;
    } else {
      out.push(data[i]);
      code++;
      if (code === 0xFF) {
        out[codeIdx] = code;
        codeIdx = out.length;
        out.push(0); // placeholder
        code = 1;
      }
    }
  }
  out[codeIdx] = code;
  out.push(0x00); // sentinel
  return new Uint8Array(out);
}

function cobsDecode(buf) {
  // buf should NOT include the trailing 0x00 sentinel
  const out = [];
  let i = 0;
  while (i < buf.length) {
    const code = buf[i++];
    if (code === 0) throw new Error("COBS: unexpected zero");
    for (let j = 1; j < code && i < buf.length; j++) {
      out.push(buf[i++]);
    }
    if (code < 0xFF && i < buf.length) {
      out.push(0);
    }
  }
  // Remove trailing zero if present (artifact of COBS for non-0xFF final block)
  if (out.length > 0 && out[out.length - 1] === 0) {
    out.pop();
  }
  return new Uint8Array(out);
}

// ── Postcard binary reader ──
// Reads postcard-serialized data from a Uint8Array.
class PostcardReader {
  constructor(buf) { this.buf = buf; this.pos = 0; }
  u8() { return this.buf[this.pos++]; }
  bool() { return this.u8() !== 0; }
  varint() {
    let val = 0, shift = 0;
    while (true) {
      const b = this.u8();
      val |= (b & 0x7F) << shift;
      if ((b & 0x80) === 0) return val;
      shift += 7;
    }
  }
  str() {
    const len = this.varint();
    const bytes = this.buf.slice(this.pos, this.pos + len);
    this.pos += len;
    return new TextDecoder().decode(bytes);
  }
  remaining() { return this.buf.length - this.pos; }
}

// ── Postcard binary writer ──
class PostcardWriter {
  constructor() { this.buf = []; }
  u8(v) { this.buf.push(v & 0xFF); }
  bool(v) { this.u8(v ? 1 : 0); }
  varint(v) {
    v = v >>> 0; // ensure unsigned
    while (v >= 0x80) {
      this.buf.push((v & 0x7F) | 0x80);
      v >>>= 7;
    }
    this.buf.push(v & 0x7F);
  }
  finish() { return new Uint8Array(this.buf); }
}

// ── Protocol constants ──
// Request variant indices (host -> device)
const REQ_PING = 0;
const REQ_VERSION = 1;
const REQ_GET_CONFIG = 2;
const REQ_PUT_CONFIG = 3;
const REQ_SAVE = 4;
const REQ_RESET = 5;
const REQ_REBOOT = 6;

// Response variant indices (device -> host)
const RESP_PONG = 0;
const RESP_VERSION = 1;
const RESP_CONFIG = 2;
const RESP_OK = 3;
const RESP_ERROR = 4;
const RESP_MONITOR = 5;

const MAX_BUTTONS = 8;
const MAX_TOUCH_PADS = 8;
const MAX_POTS = 4;

// ── MIDI note names ──
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function noteName(n) {
  if (n < 0 || n > 127) return "";
  return NOTE_NAMES[n % 12] + (Math.floor(n / 12) - 1);
}

// ── Toast notifications ──
let toastTimer = null;
function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast " + type + " visible";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove("visible"); }, 2500);
}

// ── Serial log ──
const logEl = document.getElementById("logContent");
function log(text, cls) {
  const span = document.createElement("span");
  span.className = cls || "";
  span.textContent = text + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Serial connection state ──
let port = null, reader = null, writer = null, keepReading = false;
// Binary receive buffer: accumulates raw bytes, split on 0x00 sentinels
let rxBuf = [];
// Completed COBS frames (bytes between 0x00 sentinels), not yet processed
let rxFrames = [];
// Promise chain to serialize command/response exchanges
let cmdLock = Promise.resolve();

// ── DOM refs ──
const btnConnect = document.getElementById("btnConnect");
const btnRefresh = document.getElementById("btnRefresh");
const btnSave = document.getElementById("btnSave");
const btnReset = document.getElementById("btnReset");
const btnReboot = document.getElementById("btnReboot");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const configPanel = document.getElementById("configPanel");
const emptyState = document.getElementById("emptyState");

// ── Config model ──
let config = null;

// ── Monitor state ──
let monitorTapTimer = null;

// ── Helpers ──
function num(s, fallback) { const v = parseInt(s, 10); return isNaN(v) ? fallback : v; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Web Serial check ──
if (!("serial" in navigator)) {
  document.getElementById("unsupported").style.display = "block";
  btnConnect.disabled = true;
}

// ── Build and send a COBS-framed postcard Request ──
function buildRequest(variantIndex, configObj) {
  const w = new PostcardWriter();
  w.varint(variantIndex);
  if (variantIndex === REQ_PUT_CONFIG && configObj) {
    writeConfig(w, configObj);
  }
  return cobsEncode(w.finish());
}

// ── Serialize Config into PostcardWriter ──
// Must match firmware Config struct field order exactly:
//   midi_channel: u8, num_buttons: u8, buttons: [ButtonDef;8],
//   num_touch_pads: u8, touch_pads: [TouchPadDef;8],
//   num_pots: u8, pots: [PotDef;4],
//   ldr: PotDef, ldr_enabled: bool,
//   accel: AccelConfig
function writeConfig(w, cfg) {
  w.u8(cfg.midi_channel);
  w.u8(cfg.buttons.length);
  for (let i = 0; i < MAX_BUTTONS; i++) {
    if (i < cfg.buttons.length) {
      w.u8(cfg.buttons[i].pin);
      w.u8(cfg.buttons[i].note);
      w.u8(cfg.buttons[i].velocity);
    } else {
      w.u8(0); w.u8(0); w.u8(0);
    }
  }
  w.u8(cfg.touch_pads.length);
  for (let i = 0; i < MAX_TOUCH_PADS; i++) {
    if (i < cfg.touch_pads.length) {
      w.u8(cfg.touch_pads[i].pin);
      w.u8(cfg.touch_pads[i].note);
      w.u8(cfg.touch_pads[i].velocity);
    } else {
      w.u8(0); w.u8(0); w.u8(0);
    }
  }
  w.u8(cfg.pots.length);
  for (let i = 0; i < MAX_POTS; i++) {
    if (i < cfg.pots.length) {
      w.u8(cfg.pots[i].pin);
      w.u8(cfg.pots[i].cc);
    } else {
      w.u8(0); w.u8(0);
    }
  }
  // ldr: PotDef
  w.u8(cfg.ldr.pin);
  w.u8(cfg.ldr.cc);
  // ldr_enabled: bool
  w.bool(cfg.ldr_enabled);
  // accel: AccelConfig { enabled, sda_pin, scl_pin, int_pin, x_cc, y_cc,
  //   tap_note, tap_velocity, dead_zone_tenths, smoothing_pct }
  w.bool(cfg.accel_enabled);
  w.u8(cfg.accel.sda);
  w.u8(cfg.accel.scl);
  w.u8(cfg.accel.int_pin);
  w.u8(cfg.accel.x_cc);
  w.u8(cfg.accel.y_cc);
  w.u8(cfg.accel.tap_note);
  w.u8(cfg.accel.tap_vel);
  w.u8(cfg.accel.dead_zone);
  w.u8(cfg.accel.smoothing);
}

// ── Deserialize Config from PostcardReader ──
function readConfig(r) {
  const cfg = {
    midi_channel: 0, buttons: [], touch_pads: [], pots: [],
    ldr_enabled: false, ldr: { pin: 0, cc: 0 },
    accel_enabled: false,
    accel: { sda: 0, scl: 0, int_pin: 0, x_cc: 0, y_cc: 0, tap_note: 0, tap_vel: 1, dead_zone: 0, smoothing: 0 },
  };
  cfg.midi_channel = r.u8();
  const nb = r.u8();
  for (let i = 0; i < MAX_BUTTONS; i++) {
    const pin = r.u8(), note = r.u8(), velocity = r.u8();
    if (i < nb) cfg.buttons.push({ pin, note, velocity });
  }
  const nt = r.u8();
  for (let i = 0; i < MAX_TOUCH_PADS; i++) {
    const pin = r.u8(), note = r.u8(), velocity = r.u8();
    if (i < nt) cfg.touch_pads.push({ pin, note, velocity });
  }
  const np = r.u8();
  for (let i = 0; i < MAX_POTS; i++) {
    const pin = r.u8(), cc = r.u8();
    if (i < np) cfg.pots.push({ pin, cc });
  }
  cfg.ldr = { pin: r.u8(), cc: r.u8() };
  cfg.ldr_enabled = r.bool();
  cfg.accel_enabled = r.bool();
  cfg.accel = {
    sda: r.u8(), scl: r.u8(), int_pin: r.u8(),
    x_cc: r.u8(), y_cc: r.u8(),
    tap_note: r.u8(), tap_vel: r.u8(),
    dead_zone: r.u8(), smoothing: r.u8(),
  };
  return cfg;
}

// ── Deserialize MonitorSnapshot from PostcardReader ──
function readMonitorSnapshot(r) {
  const snap = { buttons: [], touch_pads: [], pots: [], ldr: 0, accel_x: 0, accel_y: 0, accel_tap: false };
  for (let i = 0; i < MAX_BUTTONS; i++) snap.buttons.push(r.bool());
  for (let i = 0; i < MAX_TOUCH_PADS; i++) snap.touch_pads.push(r.bool());
  for (let i = 0; i < MAX_POTS; i++) snap.pots.push(r.u8());
  snap.ldr = r.u8();
  snap.accel_x = r.u8();
  snap.accel_y = r.u8();
  snap.accel_tap = r.bool();
  return snap;
}

// ── Parse a decoded postcard response ──
// Returns { type, ...fields } or null on error.
function parseResponse(bytes) {
  const r = new PostcardReader(bytes);
  const variant = r.varint();
  switch (variant) {
    case RESP_PONG:
      return { type: "pong" };
    case RESP_VERSION:
      return { type: "version", value: r.str() };
    case RESP_CONFIG:
      return { type: "config", value: readConfig(r) };
    case RESP_OK:
      return { type: "ok" };
    case RESP_ERROR:
      return { type: "error", message: r.str() };
    case RESP_MONITOR:
      return { type: "monitor", value: readMonitorSnapshot(r) };
    default:
      return null;
  }
}

// ── Connect / Disconnect ──
btnConnect.addEventListener("click", async () => {
  if (port) await disconnect(); else await connect();
});

async function connect() {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    writer = port.writable.getWriter();
    keepReading = true;
    rxBuf = [];
    rxFrames = [];
    readLoop();
    setConnected(true);
    log("Connected", "resp");
    // Query firmware version
    const resp = await sendRequest(REQ_VERSION);
    if (resp.type === "version") {
      if (!resp.value.startsWith("midictrl")) {
        toast("Unexpected device: " + resp.value, "error");
      } else {
        statusText.textContent = resp.value;
      }
    } else {
      toast("Unexpected response", "error");
    }
    await refreshConfig();
  } catch (e) {
    if (e.name !== "NotFoundError") {
      log("Connection error: " + e.message, "err");
      toast("Connection failed", "error");
    }
    await disconnect();
  }
}

async function disconnect() {
  keepReading = false;
  try { if (reader) { await reader.cancel(); reader.releaseLock(); } } catch {}
  try { if (writer) { writer.releaseLock(); } } catch {}
  try { if (port) { await port.close(); } } catch {}
  reader = null; writer = null; port = null;
  rxBuf = []; rxFrames = [];
  cmdLock = Promise.resolve();
  setConnected(false);
  log("Disconnected", "err");
}

function setConnected(connected) {
  statusDot.className = connected ? "status-dot connected" : "status-dot";
  if (!connected) statusText.textContent = "Disconnected";
  btnConnect.textContent = connected ? "Disconnect" : "Connect";
  btnConnect.classList.toggle("btn-primary", !connected);
  btnConnect.classList.toggle("btn-danger", connected);
  btnRefresh.disabled = !connected;
  btnSave.disabled = !connected;
  btnReset.disabled = !connected;
  btnReboot.disabled = !connected;
  configPanel.style.display = connected ? "" : "none";
  emptyState.style.display = connected ? "none" : "";
}

function setToolbarBusy(busy) {
  btnRefresh.disabled = busy;
  btnSave.disabled = busy;
  btnReset.disabled = busy;
  btnReboot.disabled = busy;
}

// ── Read loop: accumulates bytes, splits on 0x00 sentinels ──
async function readLoop() {
  while (keepReading && port && port.readable) {
    try {
      reader = port.readable.getReader();
      while (keepReading) {
        const { value, done } = await reader.read();
        if (done) break;
        for (let i = 0; i < value.length; i++) {
          if (value[i] === 0x00) {
            // End of COBS frame
            if (rxBuf.length > 0) {
              rxFrames.push(new Uint8Array(rxBuf));
              rxBuf = [];
            }
          } else {
            rxBuf.push(value[i]);
          }
        }
        // Process any monitor frames immediately (non-command responses)
        drainMonitorFrames();
      }
    } catch (e) {
      if (keepReading) log("Read error: " + e.message, "err");
    } finally {
      try { reader.releaseLock(); } catch {}
      reader = null;
    }
  }
}

// ── Process and remove monitor frames from rxFrames ──
function drainMonitorFrames() {
  let i = 0;
  while (i < rxFrames.length) {
    try {
      const decoded = cobsDecode(rxFrames[i]);
      const r = new PostcardReader(decoded);
      const variant = r.varint();
      if (variant === RESP_MONITOR) {
        const snap = readMonitorSnapshot(r);
        applyMonitorData(snap);
        rxFrames.splice(i, 1);
        continue;
      }
    } catch {}
    i++;
  }
}

// ── Send a request and wait for a non-monitor response ──
function sendRequest(variantIndex, configObj) {
  const p = cmdLock.then(() => _sendRequest(variantIndex, configObj));
  cmdLock = p.catch(() => {});
  return p;
}

async function _sendRequest(variantIndex, configObj) {
  if (!writer) throw new Error("Not connected");
  const reqNames = ["PING", "VERSION", "GET_CONFIG", "PUT_CONFIG", "SAVE", "RESET", "REBOOT"];
  log("> " + (reqNames[variantIndex] || "?"), "cmd");

  // Flush any stale non-monitor frames
  rxFrames = rxFrames.filter(frame => {
    try {
      const decoded = cobsDecode(frame);
      const r = new PostcardReader(decoded);
      return r.varint() === RESP_MONITOR;
    } catch { return false; }
  });

  const frame = buildRequest(variantIndex, configObj);
  await writer.write(frame);

  const deadline = Date.now() + 3000;
  while (Date.now() < deadline) {
    await sleep(15);
    // Look for a non-monitor response frame
    for (let i = 0; i < rxFrames.length; i++) {
      try {
        const decoded = cobsDecode(rxFrames[i]);
        const resp = parseResponse(decoded);
        if (resp && resp.type !== "monitor") {
          rxFrames.splice(i, 1);
          const desc = resp.type === "error" ? "ERR: " + resp.message :
                       resp.type === "version" ? resp.value :
                       resp.type === "config" ? "Config (" + resp.value.buttons.length + " btns)" :
                       resp.type.toUpperCase();
          log(desc, resp.type === "error" ? "err" : "resp");
          return resp;
        }
      } catch {
        // Bad frame, discard
        rxFrames.splice(i, 1);
        i--;
      }
    }
  }
  throw new Error("Timeout waiting for response");
}

// ── Refresh / Apply / Save / Reset / Reboot ──
async function refreshConfig() {
  setToolbarBusy(true);
  try {
    const resp = await sendRequest(REQ_GET_CONFIG);
    if (resp.type === "config") {
      config = resp.value;
      renderConfig();
      toast("Config loaded", "success");
    } else if (resp.type === "error") {
      throw new Error(resp.message);
    } else {
      throw new Error("Unexpected response: " + resp.type);
    }
  } catch (e) {
    log("Refresh failed: " + e.message, "err");
    toast("Failed to load config", "error");
  } finally {
    setToolbarBusy(false);
  }
}

btnRefresh.addEventListener("click", refreshConfig);

async function applyConfig() {
  try {
    readConfigFromUI();
    const resp = await sendRequest(REQ_PUT_CONFIG, config);
    if (resp.type === "ok") return true;
    throw new Error(resp.type === "error" ? resp.message : "Unexpected: " + resp.type);
  } catch (e) {
    log("Apply failed: " + e.message, "err");
    toast("Apply failed: " + e.message, "error");
    return false;
  }
}

btnSave.addEventListener("click", async () => {
  setToolbarBusy(true);
  try {
    if (!await applyConfig()) return;
    const resp = await sendRequest(REQ_SAVE);
    if (resp.type === "ok") toast("Saved to flash", "success");
    else toast("Save failed: " + (resp.message || resp.type), "error");
  } catch (e) {
    log("Save error: " + e.message, "err");
    toast("Save failed", "error");
  } finally {
    setToolbarBusy(false);
  }
});

btnReset.addEventListener("click", async () => {
  if (!confirm("Reset all config to factory defaults? (in RAM only, use Save to persist)")) return;
  setToolbarBusy(true);
  try {
    const resp = await sendRequest(REQ_RESET);
    if (resp.type === "ok") {
      await refreshConfig();
      toast("Defaults restored", "info");
    }
  } catch (e) {
    log("Reset error: " + e.message, "err");
    toast("Reset failed", "error");
  } finally {
    setToolbarBusy(false);
  }
});

btnReboot.addEventListener("click", async () => {
  if (!confirm("Reboot the device? Unsaved changes will be lost.")) return;
  setToolbarBusy(true);
  try {
    await sendRequest(REQ_REBOOT);
    toast("Device rebooting...", "info");
    await disconnect();
  } catch (e) {
    await disconnect();
    toast("Device rebooted", "info");
  }
});

// ── Render config into UI ──
function renderConfig() {
  if (!config) return;

  document.getElementById("midiChannel").value = config.midi_channel;
  updateMidiChannelHint();

  renderList("buttonList", "btnCount", config.buttons, "button", 8);
  renderList("touchList", "touchCount", config.touch_pads, "touch", 8);
  renderPotList("potList", "potCount", config.pots, 4);

  document.getElementById("ldrEnabled").checked = config.ldr_enabled;
  document.getElementById("ldrPin").value = config.ldr.pin;
  document.getElementById("ldrCc").value = config.ldr.cc;
  updateLdrFieldVisibility();
  buildLdrMonitor();

  document.getElementById("accelEnabled").checked = config.accel_enabled;
  document.getElementById("accelSda").value = config.accel.sda;
  document.getElementById("accelScl").value = config.accel.scl;
  document.getElementById("accelInt").value = config.accel.int_pin;
  document.getElementById("accelXCc").value = config.accel.x_cc;
  document.getElementById("accelYCc").value = config.accel.y_cc;
  document.getElementById("accelTapNote").value = config.accel.tap_note;
  document.getElementById("accelTapVel").value = config.accel.tap_vel;
  document.getElementById("accelDeadZone").value = config.accel.dead_zone;
  document.getElementById("accelSmoothing").value = config.accel.smoothing;
  updateAccelFieldVisibility();
  updateAccelHints();
  buildAccelMonitor();
}

function renderList(containerId, countId, items, type, max) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  document.getElementById(countId).textContent = items.length;

  const monPrefix = type === "button" ? "monBtn" : "monTouch";

  items.forEach((item, i) => {
    const row = document.createElement("div");
    row.className = "item-row";
    row.innerHTML =
      `<span class="index">#${i + 1}</span>` +
      `<div class="monitor-indicator" id="${monPrefix}${i}"></div>` +
      `<label>Pin</label><input type="number" min="0" max="29" value="${item.pin}" data-type="${type}" data-idx="${i}" data-field="pin">` +
      `<label>Note</label><input type="number" min="0" max="127" value="${item.note}" data-type="${type}" data-idx="${i}" data-field="note">` +
      `<span class="note-hint">${noteName(item.note)}</span>` +
      `<label>Vel</label><input type="number" min="1" max="127" value="${item.velocity}" data-type="${type}" data-idx="${i}" data-field="velocity">` +
      `<button class="btn-remove" data-type="${type}" data-idx="${i}">Remove</button>`;
    container.appendChild(row);
  });

  container.querySelectorAll('input[data-field="note"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const hint = inp.parentElement.querySelector(".note-hint");
      if (hint) hint.textContent = noteName(parseInt(inp.value, 10) || 0);
    });
  });

  container.querySelectorAll(".btn-remove").forEach(btn => {
    btn.addEventListener("click", () => {
      syncFromDOM(container, items, ["pin", "note", "velocity"]);
      const idx = parseInt(btn.dataset.idx, 10);
      items.splice(idx, 1);
      renderList(containerId, countId, items, type, max);
    });
  });

  const addId = type === "button" ? "addButton" : "addTouch";
  document.getElementById(addId).disabled = items.length >= max;
}

function renderPotList(containerId, countId, items, max) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  document.getElementById(countId).textContent = items.length;

  items.forEach((item, i) => {
    const row = document.createElement("div");
    row.className = "item-row";
    row.innerHTML =
      `<span class="index">#${i + 1}</span>` +
      `<div class="monitor-bar-track" style="max-width:80px"><div class="monitor-bar-fill" id="monPotBar${i}"></div></div>` +
      `<span class="monitor-value" id="monPotVal${i}" style="min-width:24px">0</span>` +
      `<label>Pin</label><input type="number" min="0" max="29" value="${item.pin}" data-type="pot" data-idx="${i}" data-field="pin">` +
      `<label>CC</label><input type="number" min="0" max="127" value="${item.cc}" data-type="pot" data-idx="${i}" data-field="cc">` +
      `<button class="btn-remove" data-type="pot" data-idx="${i}">Remove</button>`;
    container.appendChild(row);
  });

  container.querySelectorAll(".btn-remove").forEach(btn => {
    btn.addEventListener("click", () => {
      syncFromDOM(container, items, ["pin", "cc"]);
      const idx = parseInt(btn.dataset.idx, 10);
      items.splice(idx, 1);
      renderPotList(containerId, countId, items, max);
    });
  });

  document.getElementById("addPot").disabled = items.length >= max;
}

function buildLdrMonitor() {
  const container = document.getElementById("ldrMonitor");
  container.innerHTML = "";
  if (!config || !config.ldr_enabled) return;
  const row = document.createElement("div");
  row.className = "monitor-row";
  row.innerHTML =
    '<span class="monitor-label">Value</span>' +
    '<div class="monitor-bar-track"><div class="monitor-bar-fill" id="monLdrBar"></div></div>' +
    '<span class="monitor-value" id="monLdrVal">0</span>';
  container.appendChild(row);
}

function buildAccelMonitor() {
  const container = document.getElementById("accelMonitor");
  container.innerHTML = "";
  if (!config || !config.accel_enabled) return;

  [["Tilt X", "monAccelXBar", "monAccelXVal", "64"],
   ["Tilt Y", "monAccelYBar", "monAccelYVal", "64"]].forEach(([label, barId, valId, def]) => {
    const row = document.createElement("div");
    row.className = "monitor-row";
    row.innerHTML =
      `<span class="monitor-label">${label}</span>` +
      `<div class="monitor-bar-track"><div class="monitor-bar-fill" id="${barId}"></div></div>` +
      `<span class="monitor-value" id="${valId}">${def}</span>`;
    container.appendChild(row);
  });

  const tapRow = document.createElement("div");
  tapRow.className = "monitor-row";
  tapRow.innerHTML =
    '<span class="monitor-label">Tap</span>' +
    '<div class="monitor-tap" id="monAccelTap"></div>';
  container.appendChild(tapRow);
}

// Sync DOM input values back into items arrays
function syncFromDOM(container, items, fields) {
  container.querySelectorAll(".item-row").forEach((row, i) => {
    if (i < items.length) {
      for (const f of fields)
        items[i][f] = num(row.querySelector(`[data-field="${f}"]`).value, items[i][f]);
    }
  });
}

// ── Add item handlers ──
document.getElementById("addButton").addEventListener("click", () => {
  if (!config || config.buttons.length >= 8) return;
  config.buttons.push({ pin: 0, note: 60, velocity: 100 });
  renderList("buttonList", "btnCount", config.buttons, "button", 8);
});

document.getElementById("addTouch").addEventListener("click", () => {
  if (!config || config.touch_pads.length >= 8) return;
  config.touch_pads.push({ pin: 0, note: 72, velocity: 100 });
  renderList("touchList", "touchCount", config.touch_pads, "touch", 8);
});

document.getElementById("addPot").addEventListener("click", () => {
  if (!config || config.pots.length >= 4) return;
  config.pots.push({ pin: 26, cc: 0 });
  renderPotList("potList", "potCount", config.pots, 4);
});

// ── Toggle visibility ──
document.getElementById("ldrEnabled").addEventListener("change", () => {
  updateLdrFieldVisibility();
  buildLdrMonitor();
});
document.getElementById("accelEnabled").addEventListener("change", () => {
  updateAccelFieldVisibility();
  buildAccelMonitor();
});

function updateLdrFieldVisibility() {
  document.getElementById("ldrFields").style.display =
    document.getElementById("ldrEnabled").checked ? "" : "none";
}

function updateAccelFieldVisibility() {
  document.getElementById("accelFields").style.display =
    document.getElementById("accelEnabled").checked ? "" : "none";
}

// ── Hints ──
document.getElementById("midiChannel").addEventListener("input", updateMidiChannelHint);
function updateMidiChannelHint() {
  const v = parseInt(document.getElementById("midiChannel").value, 10);
  document.getElementById("midiChannelHint").textContent = isNaN(v) ? "" : "Ch " + (v + 1);
}

document.getElementById("accelTapNote").addEventListener("input", updateAccelHints);
document.getElementById("accelDeadZone").addEventListener("input", updateAccelHints);
document.getElementById("accelSmoothing").addEventListener("input", updateAccelHints);

function updateAccelHints() {
  const tapNote = parseInt(document.getElementById("accelTapNote").value, 10);
  document.getElementById("tapNoteHint").textContent = isNaN(tapNote) ? "" : noteName(tapNote);
  const dz = parseInt(document.getElementById("accelDeadZone").value, 10);
  document.getElementById("deadZoneHint").textContent = isNaN(dz) ? "" : (dz / 10).toFixed(1) + " m/s\u00B2";
  const sm = parseInt(document.getElementById("accelSmoothing").value, 10);
  document.getElementById("smoothingHint").textContent = isNaN(sm) ? "" : "\u03B1=" + (sm / 100).toFixed(2);
}

// ── Read config from UI ──
function readConfigFromUI() {
  if (!config) return;

  config.midi_channel = clamp(num(document.getElementById("midiChannel").value, 0), 0, 15);
  config.buttons = readItemsFromDOM("buttonList");
  config.touch_pads = readItemsFromDOM("touchList");
  config.pots = readPotsFromDOM("potList");

  config.ldr_enabled = document.getElementById("ldrEnabled").checked;
  config.ldr = {
    pin: clamp(num(document.getElementById("ldrPin").value, 0), 0, 29),
    cc: clamp(num(document.getElementById("ldrCc").value, 0), 0, 127),
  };

  config.accel_enabled = document.getElementById("accelEnabled").checked;
  config.accel = {
    sda: clamp(num(document.getElementById("accelSda").value, 0), 0, 29),
    scl: clamp(num(document.getElementById("accelScl").value, 0), 0, 29),
    int_pin: clamp(num(document.getElementById("accelInt").value, 0), 0, 29),
    x_cc: clamp(num(document.getElementById("accelXCc").value, 0), 0, 127),
    y_cc: clamp(num(document.getElementById("accelYCc").value, 0), 0, 127),
    tap_note: clamp(num(document.getElementById("accelTapNote").value, 0), 0, 127),
    tap_vel: clamp(num(document.getElementById("accelTapVel").value, 1), 1, 127),
    dead_zone: clamp(num(document.getElementById("accelDeadZone").value, 0), 0, 255),
    smoothing: clamp(num(document.getElementById("accelSmoothing").value, 0), 0, 100),
  };
}

function readItemsFromDOM(containerId) {
  const items = [];
  document.getElementById(containerId).querySelectorAll(".item-row").forEach(row => {
    items.push({
      pin: clamp(num(row.querySelector('[data-field="pin"]').value, 0), 0, 29),
      note: clamp(num(row.querySelector('[data-field="note"]').value, 0), 0, 127),
      velocity: clamp(num(row.querySelector('[data-field="velocity"]').value, 100), 1, 127),
    });
  });
  return items;
}

function readPotsFromDOM(containerId) {
  const items = [];
  document.getElementById(containerId).querySelectorAll(".item-row").forEach(row => {
    items.push({
      pin: clamp(num(row.querySelector('[data-field="pin"]').value, 0), 0, 29),
      cc: clamp(num(row.querySelector('[data-field="cc"]').value, 0), 0, 127),
    });
  });
  return items;
}

// ── Collapsible log section (only for the log card, not managed by web component) ──
document.querySelectorAll('.log-panel > .card-header[data-section]').forEach(header => {
  header.addEventListener("click", () => {
    const body = header.nextElementSibling;
    const isCollapsed = body.classList.toggle("collapsed");
    header.classList.toggle("collapsed", isCollapsed);
  });
});

// ── Handle disconnect event ──
if ("serial" in navigator) {
  navigator.serial.addEventListener("disconnect", (e) => {
    if (port && (e.target === port || e.port === port)) {
      disconnect();
      toast("Device disconnected", "info");
    }
  });
}

// ── Monitor: apply structured snapshot data to DOM ──
function updateMonitorBar(barId, valId, v) {
  const bar = document.getElementById(barId);
  const val = document.getElementById(valId);
  if (bar) bar.style.width = ((v / 127) * 100).toFixed(1) + "%";
  if (val) val.textContent = v;
}

function applyMonitorData(snap) {
  for (let i = 0; i < snap.buttons.length && i < MAX_BUTTONS; i++) {
    const el = document.getElementById("monBtn" + i);
    if (el) el.classList.toggle("active", snap.buttons[i]);
  }
  for (let i = 0; i < snap.touch_pads.length && i < MAX_TOUCH_PADS; i++) {
    const el = document.getElementById("monTouch" + i);
    if (el) el.classList.toggle("active", snap.touch_pads[i]);
  }
  for (let i = 0; i < snap.pots.length && i < MAX_POTS; i++) {
    updateMonitorBar("monPotBar" + i, "monPotVal" + i, snap.pots[i]);
  }
  updateMonitorBar("monLdrBar", "monLdrVal", snap.ldr);
  updateMonitorBar("monAccelXBar", "monAccelXVal", snap.accel_x);
  updateMonitorBar("monAccelYBar", "monAccelYVal", snap.accel_y);
  if (snap.accel_tap) {
    const el = document.getElementById("monAccelTap");
    if (el) {
      el.classList.add("active");
      clearTimeout(monitorTapTimer);
      monitorTapTimer = setTimeout(() => el.classList.remove("active"), 200);
    }
  }
}
