[target.'cfg(all(target_arch = "arm", target_os = "none"))']
rustflags = [
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

[env]
DEFMT_LOG = "info"
# CDC-ACM (2) + MIDI (2) + UAC audio (2) = 6 interfaces; embassy-usb defaults to 4.
EMBASSY_USB_MAX_INTERFACE_COUNT = "8"
